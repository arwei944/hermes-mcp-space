name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 << 'SCRIPT'
          import os
          from huggingface_hub import HfApi, create_repo
          from pathlib import Path

          token = os.environ["HF_TOKEN"]
          repo_id = "arwei944/hermes-mcp-space"

          # 1. 创建 Space（如果不存在）
          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="gradio",
              exist_ok=True,
              token=token
          )
          print(f"✅ Space {repo_id} 就绪")

          # 2. 上传所有文件（排除魔搭专用文件和 Dockerfile）
          api = HfApi(token=token)
          folder_path = os.environ.get("GITHUB_WORKSPACE", ".")
          print(f"📁 上传目录: {folder_path}")
          api.upload_folder(
              folder_path=folder_path,
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"deploy: {__import__('datetime').datetime.utcnow().isoformat()}",
              delete_patterns=["*.pyc", "__pycache__/*", ".github/*", "Dockerfile", "ms_deploy.json", "config.yaml.example"],
              ignore_patterns=[".git/*", "__pycache__/*", "*.pyc", "Dockerfile", "ms_deploy.json", "config.yaml.example", ".gitignore"],
          )
          print(f"✅ 部署完成!")
          print(f"📍 https://huggingface.co/spaces/{repo_id}")
          SCRIPT
