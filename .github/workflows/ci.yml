name: CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ESLint
        run: cd frontend && npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check JS with ESLint
        run: cd frontend && npx eslint js/

      - name: Check JS syntax (all files)
        run: |
          echo "=== Checking JS files ==="
          ERRORS=0
          for f in frontend/js/app.js frontend/js/components.js frontend/js/pages/*.js; do
            if [ -f "$f" ]; then
              if ! node --check "$f" 2>&1; then
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "MISSING: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS JS file(s) failed syntax check"
            exit 1
          fi
          echo "✅ All JS files passed syntax check"

      - name: Check Python syntax (all files)
        run: |
          echo "=== Checking Python files ==="
          ERRORS=0
          for f in app.py backend/*.py backend/routers/*.py backend/services/*.py; do
            if [ -f "$f" ]; then
              if ! python3 -m py_compile "$f" 2>&1; then
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "MISSING: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS Python file(s) failed syntax check"
            exit 1
          fi
          echo "✅ All Python files passed syntax check"

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 << 'SCRIPT'
          import os
          from huggingface_hub import HfApi, create_repo

          token = os.environ["HF_TOKEN"]
          repo_id = "arwei944/hermes-mcp-space"

          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
              token=token
          )

          api = HfApi(token=token)
          folder_path = os.environ.get("GITHUB_WORKSPACE", ".")
          api.upload_folder(
              folder_path=folder_path,
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"deploy: {__import__('datetime').datetime.utcnow().isoformat()}",
              delete_patterns=["*.pyc", "__pycache__/*", ".github/*"],
              ignore_patterns=[".git/*", "__pycache__/*", "*.pyc", ".gitignore", "node_modules/*"],
          )
          print(f"Deployed to https://huggingface.co/spaces/{repo_id}")
          SCRIPT
