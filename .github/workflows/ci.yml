name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
            - run: npm ci
            - run: npm run lint
            - name: Check for console.log in production
              run: |
                  echo "Checking for leftover console.log..."
                  grep -rn "console\.log" frontend/js/pages/ frontend/js/components/ frontend/js/core/ --include="*.js" | grep -v "node_modules" | head -20 || echo "No console.log found in production code"

    version-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Verify version consistency
              run: |
                  VERSION=$(python3 -c "import sys; sys.path.insert(0,'backend'); from version import get_version; print(get_version())")
                  echo "Current version: $VERSION"
                  if git tag -l "v$VERSION" | grep -q .; then
                      echo "ERROR: Tag v$VERSION already exists!"
                      exit 1
                  fi
                  echo "Version check passed"

    deploy:
        needs: [lint, version-check]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Trigger HuggingFace Space rebuild
              run: |
                  curl -X POST "https://huggingface.co/api/spaces/arwei945/hermes-mcp-space/restart" \
                  -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" || echo "HF deploy trigger failed (may need HF_TOKEN secret)"
