<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent MCP Space — 开发流程演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2128;
  --bg-terminal: #0a0e14;
  --border: #30363d;
  --border-light: #21262d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --blue: #58a6ff;
  --blue-dim: #1f6feb;
  --green: #3fb950;
  --green-dim: #238636;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
  --orange: #f0883e;
  --cyan: #39d2c0;
  --pink: #f778ba;
  --font-code: 'JetBrains Mono', 'Consolas', monospace;
  --font-ui: 'Noto Sans SC', -apple-system, sans-serif;
  --radius: 8px;
  --transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-ui);
  overflow: hidden;
}

/* ===== HEADER ===== */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.header-logo svg { width: 24px; height: 24px; }

.header-title {
  font-family: var(--font-code);
  font-size: 15px;
  font-weight: 700;
  color: var(--blue);
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: 4px;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.ctrl-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: var(--font-code);
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.ctrl-btn:hover {
  background: var(--border);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.ctrl-btn.active {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

.ctrl-btn svg { width: 14px; height: 14px; }

/* Progress */
.progress-area {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 200px;
}

.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-dim), var(--blue));
  border-radius: 3px;
  transition: width 0.4s ease;
  position: relative;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -3px;
  width: 12px;
  height: 12px;
  background: var(--blue);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(88, 166, 255, 0.5);
  opacity: 0;
  transition: opacity var(--transition);
}

.progress-bar-wrap:hover .progress-bar-fill::after { opacity: 1; }

.progress-text {
  font-family: var(--font-code);
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
}

.step-indicator {
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

/* ===== MAIN LAYOUT ===== */
.main {
  display: flex;
  height: calc(100vh - 53px);
  overflow: hidden;
}

/* ===== LEFT PANEL: FILE TREE ===== */
.file-tree-panel {
  width: 15%;
  min-width: 200px;
  max-width: 280px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.panel-header {
  padding: 10px 14px;
  font-family: var(--font-code);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.panel-header svg { width: 14px; height: 14px; color: var(--text-muted); }

.file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  font-family: var(--font-code);
  font-size: 12px;
  line-height: 1.8;
}

.tree-item {
  display: flex;
  align-items: center;
  padding: 1px 14px;
  cursor: default;
  transition: background var(--transition);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tree-item:hover { background: rgba(88, 166, 255, 0.06); }

.tree-item.active {
  background: rgba(88, 166, 255, 0.12);
  border-left: 2px solid var(--blue);
  padding-left: 12px;
}

.tree-item .icon { margin-right: 6px; flex-shrink: 0; font-size: 13px; }
.tree-item .name { color: var(--text-primary); }
.tree-item .badge {
  margin-left: auto;
  font-size: 10px;
  padding: 0 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.badge-new {
  background: rgba(63, 185, 80, 0.15);
  color: var(--green);
}

.badge-modified {
  background: rgba(210, 153, 34, 0.15);
  color: var(--yellow);
}

.tree-indent { padding-left: 20px; }
.tree-indent-2 { padding-left: 40px; }
.tree-indent-3 { padding-left: 60px; }
.tree-indent-4 { padding-left: 80px; }

/* ===== CENTER PANEL: TERMINAL/CODE ===== */
.center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.tab-bar {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  flex-shrink: 0;
  gap: 0;
}

.tab {
  padding: 8px 16px;
  font-family: var(--font-code);
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.tab:hover { color: var(--text-primary); }

.tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--blue);
}

.tab .tab-icon { font-size: 13px; }

.terminal-area {
  flex: 1;
  overflow: auto;
  padding: 0;
  position: relative;
}

.terminal-content {
  padding: 16px 20px;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: 1.7;
  min-height: 100%;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Terminal styles */
.terminal-content { background: var(--bg-terminal); }

.term-prompt {
  color: var(--green);
  user-select: none;
}

.term-cmd {
  color: var(--text-primary);
}

.term-output {
  color: var(--text-secondary);
  padding-left: 4px;
}

.term-success {
  color: var(--green);
}

.term-error {
  color: var(--red);
}

.term-warning {
  color: var(--yellow);
}

.term-comment {
  color: var(--text-muted);
  font-style: italic;
}

.term-dim { color: var(--text-muted); }

.term-highlight {
  color: var(--blue);
  font-weight: 500;
}

/* Code block */
.code-block {
  background: var(--bg-terminal);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
  margin: 8px 0;
}

.code-header {
  background: var(--bg-tertiary);
  padding: 6px 14px;
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.code-dots {
  display: flex;
  gap: 5px;
}

.code-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.code-dot:nth-child(1) { background: #f85149; }
.code-dot:nth-child(2) { background: #d29922; }
.code-dot:nth-child(3) { background: #3fb950; }

.code-body {
  padding: 14px 18px;
  overflow-x: auto;
  font-family: var(--font-code);
  font-size: 12.5px;
  line-height: 1.75;
}

.code-line {
  display: flex;
}

.line-num {
  color: var(--text-muted);
  user-select: none;
  min-width: 32px;
  text-align: right;
  padding-right: 16px;
  flex-shrink: 0;
}

.line-content { flex: 1; white-space: pre; }

/* Syntax highlighting */
.kw { color: var(--pink); }
.str { color: #a5d6ff; }
.cm { color: var(--text-muted); font-style: italic; }
.fn { color: #d2a8ff; }
.num { color: var(--orange); }
.op { color: var(--text-primary); }
.var { color: var(--text-primary); }
.type { color: var(--cyan); }
.decorator { color: var(--yellow); }
.param { color: #ffa657; }
.bool { color: var(--orange); }
.self { color: var(--red); }
.const { color: var(--blue); }
.tag { color: var(--green); }
.attr { color: var(--cyan); }
.punct { color: var(--text-secondary); }
.diff-add { color: var(--green); }
.diff-del { color: var(--red); }
.diff-file { color: var(--blue); }

/* ===== RIGHT PANEL: EXPLANATION ===== */
.explain-panel {
  width: 30%;
  min-width: 260px;
  max-width: 380px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}

.explain-content {
  padding: 20px;
  animation: fadeIn 0.4s ease;
}

.step-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--blue);
  background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.2);
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 12px;
}

.step-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
  line-height: 1.4;
}

.step-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 20px;
}

.step-desc strong {
  color: var(--text-primary);
  font-weight: 500;
}

.step-desc code {
  font-family: var(--font-code);
  font-size: 12px;
  background: var(--bg-tertiary);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--cyan);
}

.module-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.module-tag {
  font-family: var(--font-code);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
}

.tag-backend { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border: 1px solid rgba(210, 153, 34, 0.25); }
.tag-frontend { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.25); }
.tag-infra { background: rgba(188, 140, 255, 0.15); color: var(--purple); border: 1px solid rgba(188, 140, 255, 0.25); }
.tag-mcp { background: rgba(88, 166, 255, 0.15); color: var(--blue); border: 1px solid rgba(88, 166, 255, 0.25); }
.tag-quality { background: rgba(248, 81, 73, 0.15); color: var(--red); border: 1px solid rgba(248, 81, 73, 0.25); }
.tag-deploy { background: rgba(57, 210, 192, 0.15); color: var(--cyan); border: 1px solid rgba(57, 210, 192, 0.25); }

.decision-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-left: 3px solid var(--yellow);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 12px 14px;
  margin-bottom: 16px;
}

.decision-box .label {
  font-family: var(--font-code);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--yellow);
  margin-bottom: 6px;
}

.decision-box .text {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* Summary step */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.summary-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.summary-card .label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.summary-card .value {
  font-family: var(--font-code);
  font-size: 16px;
  font-weight: 700;
}

.summary-card .value.green { color: var(--green); }
.summary-card .value.blue { color: var(--blue); }
.summary-card .value.purple { color: var(--purple); }
.summary-card .value.orange { color: var(--orange); }

.summary-list {
  font-family: var(--font-code);
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-secondary);
}

.summary-list .file-path { color: var(--cyan); }
.summary-list .arrow { color: var(--text-muted); }
.summary-list .desc { color: var(--text-secondary); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Keyboard hint */
.keyboard-hint {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 4px 14px;
  border-radius: 12px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity var(--transition);
}

.keyboard-hint:hover { opacity: 1; }

.keyboard-hint kbd {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  margin: 0 2px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--blue)">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <span class="header-title">Hermes Agent MCP Space</span>
    <span class="header-subtitle">开发流程演示</span>
  </div>
  <div class="header-divider"></div>
  <div class="controls">
    <button class="ctrl-btn" id="btnAutoPlay" onclick="toggleAutoPlay()" title="自动播放">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      <span>自动播放</span>
    </button>
    <button class="ctrl-btn" id="btnPause" onclick="pausePlay()" title="暂停" style="display:none">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span>暂停</span>
    </button>
    <button class="ctrl-btn" onclick="prevStep()" title="上一步 (←)">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="15,3 5,12 15,21"/></svg>
    </button>
    <button class="ctrl-btn" onclick="nextStep()" title="下一步 (→)">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="9,3 19,12 9,21"/></svg>
    </button>
  </div>
  <div class="header-divider"></div>
  <div class="progress-area">
    <div class="progress-bar-wrap" id="progressBar" onclick="seekProgress(event)">
      <div class="progress-bar-fill" id="progressFill" style="width:6.67%"></div>
    </div>
    <span class="progress-text" id="progressText">1 / 15</span>
  </div>
  <div class="step-indicator" id="stepIndicator">STEP 1</div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: File Tree -->
  <div class="file-tree-panel">
    <div class="panel-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      项目文件
    </div>
    <div class="file-tree" id="fileTree"></div>
  </div>

  <!-- CENTER: Terminal/Code -->
  <div class="center-panel">
    <div class="tab-bar">
      <div class="tab active" id="tabTerminal">
        <span class="tab-icon">$</span>
        <span id="tabLabel">终端</span>
      </div>
      <div class="tab" id="tabCode" style="display:none">
        <span class="tab-icon">{ }</span>
        <span id="tabCodeLabel">代码</span>
      </div>
    </div>
    <div class="terminal-area">
      <div class="terminal-content" id="terminalContent"></div>
    </div>
  </div>

  <!-- RIGHT: Explanation -->
  <div class="explain-panel">
    <div class="panel-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      步骤解说
    </div>
    <div class="explain-content" id="explainContent"></div>
  </div>
</div>

<!-- Keyboard hint -->
<div class="keyboard-hint">
  <kbd>←</kbd> 上一步 &nbsp; <kbd>→</kbd> 下一步 &nbsp; <kbd>Space</kbd> 播放/暂停
</div>

<script>
// ===== STEP DATA =====
const steps = [
  // STEP 1
  {
    title: "需求分析 — 了解项目结构",
    modules: ["后端", "前端", "MCP"],
    moduleClasses: ["tag-backend", "tag-frontend", "tag-mcp"],
    description: `首先了解项目的整体架构。运行 <code>find</code> 和 <code>ls</code> 命令查看目录结构：<br><br>
<strong>后端</strong>：17 个路由、8 个服务<br>
<strong>前端</strong>：16 个页面<br>
<strong>MCP 服务器</strong>：注册了 61 个工具<br><br>
截图功能需要贯穿：<code>MCP 工具</code> → <code>API 路由</code> → <code>服务层</code> → <code>前端页面</code>`,
    decision: "先摸清项目架构再动手，避免与现有代码风格冲突。项目使用 FastAPI + Gradio + 原生 JS 的技术栈。",
    activeFiles: [],
    terminal: () => `<div class="term-comment"># 查看后端 Python 文件结构</div>
<span class="term-prompt">$</span> <span class="term-cmd">find backend -name "*.py" | head -30</span>
<span class="term-output">backend/__init__.py
backend/mcp_server.py
backend/app.py
backend/routers/__init__.py
backend/routers/chat.py
backend/routers/config.py
backend/routers/dashboard.py
backend/routers/screenshot.py
backend/services/__init__.py
backend/services/chat_service.py
backend/services/config_service.py
backend/services/screenshot_service.py
backend/services/memory_service.py
backend/services/knowledge_service.py
backend/utils/__init__.py
backend/utils/logger.py
backend/utils/auth.py</span>

<div class="term-comment"># 查看前端页面文件</div>
<span class="term-prompt">$</span> <span class="term-cmd">ls frontend/js/pages/</span>
<span class="term-output">about.js     chat.js      config.js    cron.js
dashboard.js knowledge.js logs.js     marketplace.js
mcp.js       memory.js    plugins.js  screenshot.js
sessions.js  skills.js    tools.js    trash.js</span>

<div class="term-comment"># 统计 MCP 工具数量</div>
<span class="term-prompt">$</span> <span class="term-cmd">grep -c '"name"' backend/mcp_server.py</span>
<span class="term-success">61</span>

<div class="term-comment"># 查看路由数量</div>
<span class="term-prompt">$</span> <span class="term-cmd">ls backend/routers/*.py | wc -l</span>
<span class="term-success">17</span>

<span class="term-prompt">$</span> <span class="term-cmd">ls backend/services/*.py | wc -l</span>
<span class="term-success">8</span>`
  },
  // STEP 2
  {
    title: "后端 — 注册 MCP 工具",

      <div><span class="file-path">index.html</span> <span class="arrow">→</span> <span class="desc">侧边栏导航</span></div>
    </div>`;
  }

  container.innerHTML = html;
}

function updateProgress() {
  const pct = ((currentStep + 1) / steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentStep + 1} / ${steps.length}`;
  document.getElementById('stepIndicator').textContent = `STEP ${currentStep + 1}`;
}

function render() {
  renderFileTree();
  renderTerminal();
  renderExplanation();
  updateProgress();
}

// ===== CONTROLS =====
function goToStep(index) {
  if (index < 0 || index >= steps.length) return;
  currentStep = index;
  render();
}

function nextStep() {
  if (currentStep < steps.length - 1) {
    goToStep(currentStep + 1);
  } else {
    pausePlay();
  }
}

function prevStep() {
  if (currentStep > 0) {
    goToStep(currentStep - 1);
  }
}

function toggleAutoPlay() {
  if (isPlaying) {
    pausePlay();
  } else {
    startAutoPlay();
  }
}

function startAutoPlay() {
  isPlaying = true;
  document.getElementById('btnAutoPlay').style.display = 'none';
  document.getElementById('btnPause').style.display = 'flex';
  autoPlayTimer = setInterval(() => {
    if (currentStep < steps.length - 1) {
      nextStep();
    } else {
      pausePlay();
    }
  }, 8000);
}

function pausePlay() {
  isPlaying = false;
  document.getElementById('btnAutoPlay').style.display = 'flex';
  document.getElementById('btnPause').style.display = 'none';
  if (autoPlayTimer) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
  }
}

function seekProgress(event) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  const step = Math.round(pct * (steps.length - 1));
  goToStep(Math.max(0, Math.min(steps.length - 1, step)));
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case 'ArrowRight':
      e.preventDefault();
      nextStep();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevStep();
      break;
    case ' ':
      e.preventDefault();
      toggleAutoPlay();
      break;
  }
});

// ===== INIT =====
render();
</script>
