<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Toast 通知容器 -->
<div id="toastContainer" class="toast-container"></div>

<!-- 模态框 -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">标题</h2>
            <button id="modalClose" class="modal-close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div id="modalFooter" class="modal-footer"></div>
    </div>
</div>

<!-- 移动端侧边栏遮罩 -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- 侧边栏 -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <div class="icon">H</div>
        <span>Hermes</span>
    </div>

    <div class="sidebar-search">
        <input type="text" id="globalSearch" placeholder="搜索...  ⌘K">
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">概览</div>
            <a class="nav-item active" data-page="dashboard" href="#dashboard">
                <span class="nav-icon">📊</span>
                <span>仪表盘</span>
            </a>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">管理</div>
            <a class="nav-item" data-page="sessions" href="#sessions">
                <span class="nav-icon">💬</span>
                <span>会话管理</span>
            </a>
            <a class="nav-item" data-page="chat" href="#chat">
                <span class="nav-icon">🗨️</span>
                <span>会话对话</span>
            </a>
            <a class="nav-item" data-page="tools" href="#tools">
                <span class="nav-icon">🔧</span>
                <span>工具管理</span>
            </a>
            <a class="nav-item" data-page="skills" href="#skills">
                <span class="nav-icon">⚡</span>
                <span>技能系统</span>
            </a>
            <a class="nav-item" data-page="memory" href="#memory">
                <span class="nav-icon">📖</span>
                <span>记忆管理</span>
            </a>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">自动化</div>
            <a class="nav-item" data-page="cron" href="#cron">
                <span class="nav-icon">⏰</span>
                <span>定时任务</span>
            </a>
            <a class="nav-item" data-page="agents" href="#agents">
                <span class="nav-icon">🤖</span>
                <span>子 Agent</span>
            </a>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">系统</div>
            <a class="nav-item" data-page="mcp" href="#mcp">
                <span class="nav-icon">🔌</span>
                <span>MCP 服务</span>
            </a>
            <a class="nav-item" data-page="logs" href="#logs">
                <span class="nav-icon">📋</span>
                <span>操作日志</span>
            </a>
            <a class="nav-item" data-page="config" href="#config">
                <span class="nav-icon">⚙️</span>
                <span>系统配置</span>
            </a>
            <a class="nav-item" data-page="about" href="#about">
                <span class="nav-icon">ℹ️</span>
                <span>关于</span>
            </a>
            <a class="nav-item" href="/docs" target="_blank">
                <span class="nav-icon">📖</span>
                <span>API 文档</span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto;opacity:0.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">连接中...</span>
        </div>
    </div>
</aside>

<!-- 主内容 -->
<div class="main">
    <header class="header">
        <div class="header-left">
            <button id="mobileMenuBtn" class="mobile-menu-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1 id="pageTitle" class="header-title">仪表盘</h1>
        </div>
        <div class="header-actions">
            <button id="refreshBtn" class="btn btn-ghost btn-sm" title="刷新">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                <span>刷新</span>
            </button>
        </div>
    </header>

    <div class="content" id="contentBody">
        <!-- 页面内容由 JS 动态渲染 -->
    </div>
</div>

<!-- 主题切换按钮 -->
<button id="themeToggle" class="theme-toggle" title="切换深色模式">🌙</button>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/js/components.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/sessions.js"></script>
<script src="/js/pages/chat.js"></script>
<script src="/js/pages/tools.js"></script>
<script src="/js/pages/skills.js"></script>
<script src="/js/pages/memory.js"></script>
<script src="/js/pages/cron.js"></script>
<script src="/js/pages/agents.js"></script>
<script src="/js/pages/config.js"></script>
<script src="/js/pages/about.js"></script>
<script src="/js/pages/mcp.js"></script>
<script src="/js/pages/logs.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
