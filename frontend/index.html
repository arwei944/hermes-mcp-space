<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent 管理面板</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">☤ Hermes</span>
            <button class="sidebar-toggle" id="sidebarToggle" title="折叠侧边栏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
        </div>
        <div class="sidebar-search">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="搜索... (Ctrl+K)" id="globalSearch">
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <a href="#dashboard" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-text">仪表盘</span>
            </a>
            <a href="#sessions" class="nav-item" data-page="sessions">
                <span class="nav-icon">💬</span>
                <span class="nav-text">会话管理</span>
            </a>
            <a href="#tools" class="nav-item" data-page="tools">
                <span class="nav-icon">🔧</span>
                <span class="nav-text">工具管理</span>
            </a>
            <a href="#skills" class="nav-item" data-page="skills">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">技能系统</span>
            </a>
            <a href="#memory" class="nav-item" data-page="memory">
                <span class="nav-icon">🧠</span>
                <span class="nav-text">记忆管理</span>
            </a>
            <a href="#cron" class="nav-item" data-page="cron">
                <span class="nav-icon">⏰</span>
                <span class="nav-text">定时任务</span>
            </a>
            <a href="#agents" class="nav-item" data-page="agents">
                <span class="nav-icon">🤖</span>
                <span class="nav-text">子 Agent</span>
            </a>
            <a href="#mcp" class="nav-item" data-page="mcp">
                <span class="nav-icon">🔌</span>
                <span class="nav-text">MCP 服务</span>
            </a>
            <a href="#config" class="nav-item" data-page="config">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">系统配置</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">检查中...</span>
            </div>
        </div>
    </aside>

    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">
        <header class="content-header">
            <div class="header-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <h1 id="pageTitle">仪表盘</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-ghost" id="refreshBtn" title="刷新">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                    <span>刷新</span>
                </button>
            </div>
        </header>
        <div class="content-body" id="contentBody">
            <!-- 动态内容 -->
        </div>
    </main>

    <!-- 模态框容器 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalClose">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/sessions.js"></script>
    <script src="js/pages/tools.js"></script>
    <script src="js/pages/skills.js"></script>
    <script src="js/pages/memory.js"></script>
    <script src="js/pages/cron.js"></script>
    <script src="js/pages/agents.js"></script>
    <script src="js/pages/config.js"></script>
    <script src="js/pages/mcp.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
